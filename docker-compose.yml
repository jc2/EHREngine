services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ehrengine_db
      POSTGRES_USER: ehrengine
      POSTGRES_PASSWORD: ehrengine_dev
    ports:
      - "5433:5432"
    volumes:
      - ./db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ehrengine -d ehrengine_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8010:8010"
    env_file: .env
    volumes:
      - .:/app
    command: >
      sh -c "uv sync --no-dev &&
             uv run python manage.py makemigrations --noinput &&
             uv run python manage.py migrate --noinput &&
             uv run python manage.py collectstatic --noinput &&
             uv run python manage.py seed_data --skip-if-exists &&
             uv run python manage.py createsuperuser --noinput 2>/dev/null || true &&
             uv run uvicorn ehrengine.asgi:application --host 0.0.0.0 --port 8010 --reload"
    depends_on:
      db:
        condition: service_healthy
